name: Android Build

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "APK version name"
        required: false
        default: "1.2"
      version_code:
        description: "APK version code"
        required: false
        default: "1"
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform packages
        run: |
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        env:
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: ${{ format('1.2.{0}', github.run_number) }}
          INPUT_VERSION_CODE: ${{ github.event.inputs.version_code }}
          INPUT_VERSION_NAME: ${{ github.event.inputs.version_name }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "$INPUT_VERSION_CODE" ]; then
            VERSION_CODE="$INPUT_VERSION_CODE"
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "$INPUT_VERSION_NAME" ]; then
            VERSION_NAME="$INPUT_VERSION_NAME"
          fi

          ./gradlew assembleDebug -PVERSION_CODE="$VERSION_CODE" -PVERSION_NAME="$VERSION_NAME"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: openclash-portal-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
